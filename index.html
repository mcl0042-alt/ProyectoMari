<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTask - Project Portal</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #1e1b4b, transparent);
        }
        .portal {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .links {
            display: grid;
            gap: 1rem;
        }
        a {
            display: block;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            border-radius: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            font-weight: 600;
        }
        a:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #1e293b;
            border-radius: 999px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="portal">
        <span class="badge">Assignment Submission</span>
        <h1>ZenTask Portal</h1>
        <p>AI-Assisted Development & Git Mastery Project</p>
        
        <div class="links">
            <a href="app/index.html">🚀 Launch Task Manager</a>
            <a href="docs/git-cheat-sheet.md">📄 Git Cheat Sheet</a>
            <a href="docs/presentation.md">📊 Git Journey Presentation</a>
            <a href="README.md">ℹ️ View README</a>
        </div>
    </div>
</body>
</html>
